name: 🍴 中午小編 (Gemini 2.5 深度版)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *' # 台灣時間中午 12:00

jobs:
  build_and_post:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 關鍵：允許機器人自動上傳圖片
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install google-genai requests
        
      - name: Generate Content (2.5 Flash)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python daily_food.py
      
      - name: Push Image to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/food/*.jpg
          git commit -m "Update Food Image $(date)" || echo "No changes"
          git push
      
      - name: Wait for CDN Refresh # 等待網址生效
        run: sleep 40

      - name: Final Post to Threads
        run: |
          IMG_NAME=$(sed -n '1p' post_data.txt)
          CAPTION=$(sed -n '2p' post_data.txt)
          IMG_URL="https://linkuei0425.github.io/threads-auto-poster/images/food/$IMG_NAME"
          
          echo "📤 準備發布圖片：$IMG_URL"
          
          # 呼叫 Threads API 發布圖文
          RESPONSE=$(curl -s -X POST "https://graph.threads.net/v1.0/me/threads" \
            -d "media_type=IMAGE" \
            -d "image_url=$IMG_URL" \
            -d "text=$CAPTION" \
            -d "access_token=${{ secrets.THREADS_ACCESS_TOKEN }}")
          
          CREATION_ID=$(echo $RESPONSE | jq -r '.id')
          
          if [ "$CREATION_ID" != "null" ]; then
            sleep 15
            curl -X POST "https://graph.threads.net/v1.0/me/threads_publish?creation_id=$CREATION_ID&access_token=${{ secrets.THREADS_ACCESS_TOKEN }}"
            echo "🎉 深度圖文發布成功！"
          else
            echo "❌ 失敗原因：$RESPONSE"
            exit 1
          fi
