name: 🍴 中午小編 (止血穩定版)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  build_and_post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 獲取完整紀錄以利 rebase

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install google-genai requests

      - name: Run AI script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_food.py
        
      - name: Push to GitHub (解決衝突版)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/food/*.jpg *.txt
          # 如果沒有變更就跳過，避免報錯
          git commit -m "Update for $(date +'%Y-%m-%d')" || exit 0
          
          # 嘗試多次推播，解決你提到的失敗問題
          for i in {1..3}; do
            git pull --rebase origin main
            git push && break || sleep 15
          done

      - name: Wait for GitHub Pages (穩定版)
        run: |
          IMG_NAME=$(cat img_name.txt)
          IMG_URL="https://linkuei0425.github.io/threads-auto-poster/images/food/$IMG_NAME"
          echo "🔍 檢查圖片：$IMG_URL"
          for i in {1..15}; do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' $IMG_URL)" == "200" ]; then
              echo "✅ 上線成功"; exit 0
            fi
            echo "⏳ 等待中... ($i/15)"; sleep 20
          done
          exit 1

      # ... (後續 Threads 發布邏輯保持不變) ...
