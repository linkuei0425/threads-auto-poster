name: 🍴 中午小編 (Gemini 2.5 留言分離版)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  build_and_post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install
        run: pip install google-genai requests
      - name: Run AI script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_food.py
      - name: Push Image to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/food/*.jpg
          git commit -m "Update Food Image" || echo "No changes"
          git push
      - name: Wait for CDN
        run: sleep 90 # 建議拉長到 90 秒，確保 GitHub Pages 圖片已上線

      - name: Post Main and Reply
        env:
          TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          IMG_NAME=$(cat img_name.txt)
          IMG_URL="https://linkuei0425.github.io/threads-auto-poster/images/food/$IMG_NAME"
          
          # 1. 發布主貼文 (圖 + 400字)
          echo "📤 正在建立主文容器..."
          # 💡 優化：使用 text@caption.txt 讓 curl 直接安全地讀取檔案內容
          RES_MAIN=$(curl -s -X POST "https://graph.threads.net/v1.0/me/threads" \
            --data-urlencode "media_type=IMAGE" \
            --data-urlencode "image_url=$IMG_URL" \
            --data-urlencode text@caption.txt \
            --data-urlencode "access_token=$TOKEN")
          
          MAIN_ID=$(echo $RES_MAIN | jq -r '.id')
          if [ "$MAIN_ID" == "null" ] || [ -z "$MAIN_ID" ]; then 
            echo "❌ 主文容器建立失敗：$RES_MAIN"
            exit 1
          fi
          
          sleep 15
          echo "📤 正在發布主文..."
          PUBLISH_RES=$(curl -s -X POST "https://graph.threads.net/v1.0/me/threads_publish?creation_id=$MAIN_ID&access_token=$TOKEN")
          POST_ID=$(echo $PUBLISH_RES | jq -r '.id')
          
          # 💡 優化：檢查主文是否真的發布成功
          if [ "$POST_ID" == "null" ] || [ -z "$POST_ID" ]; then 
            echo "❌ 主文發布失敗：$PUBLISH_RES"
            exit 1
          fi
          echo "✅ 主文發布成功，ID: $POST_ID"
          
          # 2. 發布地址留言 (回覆該主文)
          sleep 10
          echo "📤 正在建立地址留言容器..."
          # 💡 優化：使用 text@comment.txt 讓 curl 直接安全地讀取檔案內容
          RES_COMMENT=$(curl -s -X POST "https://graph.threads.net/v1.0/me/threads" \
            --data-urlencode "media_type=TEXT" \
            --data-urlencode text@comment.txt \
            --data-urlencode "reply_to_id=$POST_ID" \
            --data-urlencode "access_token=$TOKEN")
          
          COMMENT_ID=$(echo $RES_COMMENT | jq -r '.id')
          if [ "$COMMENT_ID" == "null" ] || [ -z "$COMMENT_ID" ]; then 
            echo "❌ 留言容器建立失敗：$RES_COMMENT"
            exit 1
          fi
          
          sleep 5
          echo "📤 正在發布留言..."
          curl -s -X POST "https://graph.threads.net/v1.0/me/threads_publish?creation_id=$COMMENT_ID&access_token=$TOKEN"
          echo "🎉 全部發布完成！"
