name: 🍴 中午小編 (全自動完整版)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *' # 台灣時間中午 12:00

jobs:
  build_and_post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-genai requests

      - name: Run AI script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_food.py
        
      - name: Push to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/food/*.jpg *.txt
          git commit -m "Update Food for $(date +'%Y-%m-%d')" || echo "No changes to commit"
          for i in {1..3}; do
            git pull --rebase origin main
            git push && break || sleep 15
          done

      - name: Wait for GitHub Pages to Deploy
        run: |
          IMG_NAME=$(cat img_name.txt)
          IMG_URL="https://linkuei0425.github.io/threads-auto-poster/images/food/$IMG_NAME"
          echo "🔍 正在檢查圖片：$IMG_URL"
          for i in {1..20}; do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' $IMG_URL)" == "200" ]; then
              echo "✅ 圖片已成功上線！"
              exit 0
            fi
            echo "⏳ 尚未上線 (重試 $i/20)..."
            sleep 20
          done
          echo "❌ 圖片部署超時"
          exit 1

      - name: Post to Threads (主文 + 雙留言)
        env:
          TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          IMG_NAME=$(cat img_name.txt)
          IMG_URL="https://linkuei0425.github.io/threads-auto-poster/images/food/$IMG_NAME"
          
          # 💡 強制讀取文字並印在 Log 裡，方便追蹤是不是空字串
          CAPTION=$(cat caption.txt)
          COMMENT1=$(cat comment.txt)
          COMMENT2=$(cat comment2.txt)
          
          echo "📝 準備發布的主文內容：$CAPTION"
          
          # 1. 發布主貼文 (改成變數傳遞，最穩定)
          echo "📤 正在建立主文..."
          RES_MAIN=$(curl -s -X POST "https://graph.threads.net/v1.0/me/threads" \
            --data-urlencode "media_type=IMAGE" \
            --data-urlencode "image_url=$IMG_URL" \
            --data-urlencode "text=$CAPTION" \
            --data-urlencode "access_token=$TOKEN")
            
          MAIN_ID=$(echo $RES_MAIN | jq -r '.id')
          if [ "$MAIN_ID" == "null" ] || [ -z "$MAIN_ID" ]; then
            echo "❌ 建立主文失敗: $RES_MAIN"
            exit 1
          fi
          
          sleep 15
          PUBLISH_RES=$(curl -s -X POST "https://graph.threads.net/v1.0/me/threads_publish?creation_id=$MAIN_ID&access_token=$TOKEN")
          POST_ID=$(echo $PUBLISH_RES | jq -r '.id')
          echo "✅ 主文成功: $POST_ID"
          
          # 2. 發布第一則留言
          sleep 10
          RES_C1=$(curl -s -X POST "https://graph.threads.net/v1.0/me/threads" \
            --data-urlencode "media_type=TEXT" \
            --data-urlencode "text=$COMMENT1" \
            --data-urlencode "reply_to_id=$POST_ID" \
            --data-urlencode "access_token=$TOKEN")
          C1_ID=$(echo $RES_C1 | jq -r '.id')
          sleep 5
          curl -s -X POST "https://graph.threads.net/v1.0/me/threads_publish?creation_id=$C1_ID&access_token=$TOKEN"
          
          # 3. 發布第二則留言
          sleep 10
          RES_C2=$(curl -s -X POST "https://graph.threads.net/v1.0/me/threads" \
            --data-urlencode "media_type=TEXT" \
            --data-urlencode "text=$COMMENT2" \
            --data-urlencode "reply_to_id=$POST_ID" \
            --data-urlencode "access_token=$TOKEN")
          C2_ID=$(echo $RES_C2 | jq -r '.id')
          sleep 5
          curl -s -X POST "https://graph.threads.net/v1.0/me/threads_publish?creation_id=$C2_ID&access_token=$TOKEN"
          echo "🎉 全部發布完成！"
