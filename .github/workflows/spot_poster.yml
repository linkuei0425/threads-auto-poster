name: ✈️ 晚間小編 (Gemini 2.5 景點雙留言蓋樓版 - 多圖輪播版)

on:
  workflow_dispatch:
  schedule:
    # 每週一.二與週五.六的 UTC 10:00 執行 (台灣/香港時間 18:00 傍晚)
    - cron: '0 10 * * 1,2,5,6'

jobs:
  build_and_post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install
        run: pip install google-genai requests
        
      - name: Run AI script (執行景點腳本)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_spot.py
        
      - name: Push Image to GitHub (推播景點圖片)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/SPOT/*.jpg
          git commit -m "Update Spot Image" || echo "No changes"
          git push

      - name: Wait for GitHub Pages to Deploy (等待景點圖片上線)
        run: |
          # 改為讀取 img_names.txt
          IMG_NAMES=$(cat img_names.txt)
          # 取出第一張圖片的名字來檢查上線狀態即可 (因為同批上傳的圖會一起上線)
          FIRST_IMG=$(echo $IMG_NAMES | cut -d',' -f1)
          IMG_URL="https://linkuei0425.github.io/threads-auto-poster/images/SPOT/$FIRST_IMG"
          echo "🔍 正在等待圖片上線：$IMG_URL"
          
          # 智慧等待迴圈：最多重試 20 次，每次等 15 秒 (最長 5 分鐘)
          for i in {1..20}; do
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" "$IMG_URL")
            if [ "$HTTP_STATUS" == "200" ]; then
              echo "✅ 圖片已成功上線！"
              break
            fi
            echo "⏳ 尚未上線 (狀態碼: $HTTP_STATUS)... 等待 15 秒後重試 ($i/20)"
            sleep 15
          done
          # 再多等 5 秒確保快取更新
          sleep 5

      - name: Post Main and Reply (發布多圖主文與雙留言)
        env:
          TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          IMG_NAMES=$(cat img_names.txt)
          echo "📸 準備發布的圖片清單：$IMG_NAMES"
          
          # 將逗號分隔的字串轉為陣列
          IFS=',' read -ra IMGS <<< "$IMG_NAMES"
          
          CHILDREN_IDS=""
          
          # 1. 為每一張圖片建立 Carousel Item 容器
          echo "📤 正在建立多圖(Carousel)子項目..."
          for IMG in "${IMGS[@]}"; do
            IMG_URL="https://linkuei0425.github.io/threads-auto-poster/images/SPOT/$IMG"
            echo "處理圖片: $IMG_URL"
            
            RES_ITEM=$(curl -s -X POST "https://graph.threads.net/v1.0/me/threads" \
              --data-urlencode "media_type=IMAGE" \
              --data-urlencode "image_url=$IMG_URL" \
              --data-urlencode "is_carousel_item=true" \
              --data-urlencode "access_token=$TOKEN")
              
            ITEM_ID=$(echo $RES_ITEM | jq -r '.id')
            if [ "$ITEM_ID" == "null" ] || [ -z "$ITEM_ID" ]; then 
              echo "❌ 圖片容器建立失敗：$RES_ITEM"
              exit 1
            fi
            
            # 串接 ID (用逗號隔開)
            if [ -z "$CHILDREN_IDS" ]; then
              CHILDREN_IDS="$ITEM_ID"
            else
              CHILDREN_IDS="$CHILDREN_IDS,$ITEM_ID"
            fi
            sleep 3
          done
          
          echo "✅ 子項目建立完成，ID 列表: $CHILDREN_IDS"

          # 2. 建立主要的多圖 Carousel 容器 (包含文字)
          sleep 5
          echo "📤 正在建立主文 Carousel 容器..."
          RES_MAIN=$(curl -s -X POST "https://graph.threads.net/v1.0/me/threads" \
            --data-urlencode "media_type=CAROUSEL" \
            --data-urlencode "children=$CHILDREN_IDS" \
            --data-urlencode text@caption.txt \
            --data-urlencode "access_token=$TOKEN")
          
          MAIN_ID=$(echo $RES_MAIN | jq -r '.id')
          if [ "$MAIN_ID" == "null" ] || [ -z "$MAIN_ID" ]; then 
            echo "❌ 主文容器建立失敗：$RES_MAIN"
            exit 1
          fi
          
          # 3. 實際發布主文
          sleep 15
          echo "📤 正在發布多圖主文..."
          PUBLISH_RES=$(curl -s -X POST "https://graph.threads.net/v1.0/me/threads_publish?creation_id=$MAIN_ID&access_token=$TOKEN")
          POST_ID=$(echo $PUBLISH_RES | jq -r '.id')
          
          if [ "$POST_ID" == "null" ] || [ -z "$POST_ID" ]; then 
            echo "❌ 主文發布失敗：$PUBLISH_RES"
            exit 1
          fi
          echo "✅ 主文發布成功，ID: $POST_ID"
          
          # 4. 發布第一則留言 (閒聊推薦)
          sleep 10
          echo "📤 正在建立第一則留言容器..."
          RES_COMMENT=$(curl -s -X POST "https://graph.threads.net/v1.0/me/threads" \
            --data-urlencode "media_type=TEXT" \
            --data-urlencode text@comment.txt \
            --data-urlencode "reply_to_id=$POST_ID" \
            --data-urlencode "access_token=$TOKEN")
          
          COMMENT_ID=$(echo $RES_COMMENT | jq -r '.id')
          if [ "$COMMENT_ID" == "null" ] || [ -z "$COMMENT_ID" ]; then 
            echo "❌ 留言1容器建立失敗：$RES_COMMENT"
            exit 1
          fi
          
          sleep 5
          echo "📤 正在發布第一則留言..."
          curl -s -X POST "https://graph.threads.net/v1.0/me/threads_publish?creation_id=$COMMENT_ID&access_token=$TOKEN"
          echo "✅ 第一則留言發布成功"

          # 5. 發布第二則留言 (詳細交通攻略)
          sleep 10
          echo "📤 正在建立第二則留言容器..."
          RES_COMMENT2=$(curl -s -X POST "https://graph.threads.net/v1.0/me/threads" \
            --data-urlencode "media_type=TEXT" \
            --data-urlencode text@comment2.txt \
            --data-urlencode "reply_to_id=$POST_ID" \
            --data-urlencode "access_token=$TOKEN")
          
          COMMENT2_ID=$(echo $RES_COMMENT2 | jq -r '.id')
          if [ "$COMMENT2_ID" == "null" ] || [ -z "$COMMENT2_ID" ]; then 
            echo "❌ 留言2容器建立失敗：$RES_COMMENT2"
            exit 1
          fi
          
          sleep 5
          echo "📤 正在發布第二則留言..."
          curl -s -X POST "https://graph.threads.net/v1.0/me/threads_publish?creation_id=$COMMENT2_ID&access_token=$TOKEN"
          echo "✅ 第二則留言發布成功"

          echo "🎉 全部發布完成！主文多圖 + 景點雙留言蓋樓成功！"
