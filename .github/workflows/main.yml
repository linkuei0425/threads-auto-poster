name: Threads Auto Poster
on:
  workflow_dispatch: # 保留手動觸發按鈕，方便你隨時測試
  schedule:
    # 這是 UTC 時間的 04:00，等於台灣時間的中午 12:00
    # '0 4 1 * *' 代表每個月的 1 號觸發
    - cron: '0 4 1 * *' 

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        # 💡 修正：直接安裝指定的套件，以免 requirements.txt 找不到造成閃退
        run: pip install google-genai requests
      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python main.py
